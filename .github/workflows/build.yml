name: Build and push tools

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth/**'
              - 'common/**'
            base64:
              - 'base64/**'
              - 'common/**'
            calendar:
              - 'calendar/**'
              - 'common/**'
            chores:
              - 'chores/**'
              - 'common/**'
            clock:
              - 'clock/**'
              - 'common/**'
            dashboard:
              - 'dashboard/**'
              - 'common/**'
            gist:
              - 'gist/**'
              - 'common/**'
            index:
              - 'index/**'
              - 'common/**'
              - 'tools.json'
            myip:
              - 'myip/**'
              - 'common/**'
            text:
              - 'text/**'
              - 'common/**'
            weather-art:
              - 'weather-art/**'
              - 'common/**'
            sunclock:
              - 'sunclock/**'
              - 'common/**'
            weather-header:
              - 'weather-header/**'
              - 'common/**'

  build:
    needs: changes
    if: ${{ needs.changes.outputs.tools != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJson(needs.changes.outputs.tools) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.tool }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.tool }}
          build-contexts: |
            common=common
            root=.
          push: true
          tags: ghcr.io/andrewgodwin/aeratools/${{ matrix.tool }}:latest
          cache-from: type=gha,scope=${{ matrix.tool }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tool }}
