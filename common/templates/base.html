<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}aeratools{% endblock %} - aeratools</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>if (window !== window.top) document.documentElement.classList.add('embedded');</script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ index_url }}" class="logo">aeratools</a>
            <a href="." class="tool">{% block toolname %}tool{% endblock %}</a>
            <a href="{{ auth_url }}" class="user" id="header-user" aria-label="User">
                {% if user %}
                    <i class="bi-person-fill"></i> &nbsp;{{ user }}
                {% else %}
                    <i class="bi-person"></i>
                {% endif %}
            </a>
            <button class="prefs" id="prefs-gear" aria-label="Preferences">
                <i class="bi-gear"></i>
            </button>
        </header>
        {% block content %}{% endblock %}
    </div>

    <div class="prefs-popup" id="prefs-popup" role="dialog" aria-label="Preferences">
        <h2>Preferences</h2>
        {% block prefs %}{% endblock %}
    </div>

    <script>
    (function () {
        var gear = document.getElementById('prefs-gear');
        var popup = document.getElementById('prefs-popup');
        gear.addEventListener('click', function (e) {
            e.stopPropagation();
            var open = popup.classList.toggle('open');
            gear.setAttribute('aria-expanded', open);
        });
        document.addEventListener('click', function (e) {
            if (!popup.contains(e.target)) {
                popup.classList.remove('open');
                gear.setAttribute('aria-expanded', 'false');
            }
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                popup.classList.remove('open');
                gear.setAttribute('aria-expanded', 'false');
            }
        });
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
