{% extends "base.html" %}

{% block title %}Weather Art{% endblock %}

{% block head %}
<style>
    body, .container {
        background: transparent;
        max-width: none;
    }

    #art-wrapper {
        position: relative;
        flex: 1;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
    }

    #art-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        transition: opacity 0.6s ease;
    }

    #art-img.loaded {
        display: block;
    }

    /* Overlay pill: temperature + description */
    #art-overlay {
        position: absolute;
        bottom: 1.2rem;
        left: 1.2rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        pointer-events: none;
    }

    .overlay-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        padding: 0.35em 0.9em;
        color: #fff;
        font-size: clamp(0.85rem, 2vw, 1.1rem);
        font-weight: 500;
        white-space: nowrap;
    }

    .overlay-pill.small {
        font-size: clamp(0.7rem, 1.5vw, 0.85rem);
        font-weight: 400;
        color: rgba(255,255,255,0.75);
    }

    #art-overlay.hidden {
        display: none;
    }


    /* Placeholder */
    #art-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        color: var(--muted);
        font-size: 1rem;
        text-align: center;
        padding: 2rem;
    }

    #art-placeholder i {
        font-size: 2.5rem;
        opacity: 0.4;
    }

    #art-placeholder.hidden {
        display: none;
    }

    /* Prefs inputs */
    .prefs-input {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 0.3em 0.6em;
        font-size: 0.85rem;
        font-family: inherit;
        width: 100%;
        transition: border-color 0.15s;
    }

    .prefs-input:focus {
        outline: none;
        border-color: var(--accent);
    }

    .prefs-input::placeholder {
        color: var(--muted);
    }
</style>
{% endblock %}

{% block content %}
<div id="art-wrapper">
    <img id="art-img" src="" alt="Weather scene" />

    <div id="art-overlay" class="hidden">
        <div class="overlay-pill" id="overlay-weather"></div>
        <div class="overlay-pill small" id="overlay-location"></div>
    </div>


    <div id="art-placeholder">
        <i class="bi-image"></i>
        <span id="placeholder-msg">Set a location in preferences</span>
    </div>
</div>
{% endblock %}

{% block prefs %}
<div class="prefs-row">
    <span class="prefs-label">Location</span>
</div>
<div>
    <input class="prefs-input" id="location-input" type="text" placeholder="City name, e.g. London">
</div>
<div class="prefs-row">
    <span class="prefs-label">Units</span>
    <button class="prefs-toggle" id="btn-units"></button>
</div>
<div class="prefs-row">
    <span class="prefs-label">Overlay</span>
    <button class="prefs-toggle" id="btn-overlay"></button>
</div>
<div class="prefs-row">
    <span class="prefs-label">Image source</span>
    <button class="prefs-toggle" id="btn-source"></button>
</div>
<div class="prefs-row" id="row-style">
    <span class="prefs-label">Style</span>
    <button class="prefs-toggle" id="btn-style"></button>
</div>
<div class="prefs-row" id="row-unsplash-label">
    <span class="prefs-label">Unsplash access key</span>
</div>
<div id="row-unsplash-key">
    <input class="prefs-input" id="unsplash-key-input" type="text" placeholder="Access key (not secret key)">
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {

    // ── WMO → search query ──
    var WMO_QUERY = {
        0:  'golden hour mountains',
        1:  'sunny mountains',
        2:  'cloudy mountains',
        3:  'overcast mountains',
        45: 'misty mountains',
        48: 'freezing mountains',
        51: 'wet mountains',
        53: 'drizzle mountains',
        55: 'drizzle mountains',
        61: 'light rain mountains',
        63: 'rain storm mountains',
        65: 'heavy rain mountains',
        71: 'light snow mountains',
        73: 'snowy forest mountains',
        75: 'blizzard mountains',
        77: 'frost mountains',
        80: 'rainbow mountains',
        81: 'dark clouds mountains',
        82: 'rain storm mountains',
        85: 'snow mountains',
        86: 'blizzard mountains',
        95: 'lightning mountains',
        96: 'hail mountains',
        99: 'hail mountains',
    };

    var WMO_DESC = {
        0:  'Clear sky',
        1:  'Mainly clear',
        2:  'Partly cloudy',
        3:  'Overcast',
        45: 'Fog',
        48: 'Icy fog',
        51: 'Light drizzle',
        53: 'Drizzle',
        55: 'Heavy drizzle',
        61: 'Light rain',
        63: 'Rain',
        65: 'Heavy rain',
        71: 'Light snow',
        73: 'Snow',
        75: 'Heavy snow',
        77: 'Snow grains',
        80: 'Light showers',
        81: 'Showers',
        82: 'Heavy showers',
        85: 'Snow showers',
        86: 'Heavy snow showers',
        95: 'Thunderstorm',
        96: 'Thunderstorm w/ hail',
        99: 'Thunderstorm w/ hail',
    };

    // ── WMO → generation prompt ──
    var WMO_PROMPT = {
        0:  'a breathtaking clear sky landscape at golden hour, warm sunlight bathing rolling hills, vivid blue sky, wide angle cinematic',
        1:  'a mostly clear bright day over a vast open landscape, soft clouds on the horizon, sunlit fields, serene and airy',
        2:  'a partly cloudy sky with dramatic light rays breaking through clouds over a sweeping landscape, atmospheric depth',
        3:  'an overcast moody landscape under a heavy grey cloud ceiling, diffused light, quiet and still atmosphere',
        45: 'a misty foggy morning in a dense forest, ethereal light filtering through fog, mysterious and tranquil',
        48: 'a freezing fog winter landscape, ice crystals coating bare tree branches, pale white sky, silent and cold',
        51: 'light drizzle falling on wet cobblestone streets, reflections in puddles, soft moody light, gentle rain',
        53: 'a drizzly grey day over a rain-soaked landscape, gentle rainfall, dark atmospheric clouds, moody and quiet',
        55: 'heavy drizzle over a stormy landscape, sheets of rain, dark brooding clouds, wet roads reflecting grey sky',
        61: 'a light rain shower over green countryside, silvery droplets catching light, fresh and clean atmosphere',
        63: 'a steady rainy day, dark storm clouds over an open landscape, rain streaking through the air, dramatic',
        65: 'heavy rain and flooding over a dramatic landscape, torrential downpour, dark storm clouds, powerful and raw',
        71: 'a gentle snowfall over a quiet winter landscape, soft white flakes drifting down, serene and peaceful',
        73: 'a snowy winter forest, thick snow on pine branches, pristine white landscape, cold crisp air',
        75: 'a heavy blizzard over a vast winter landscape, whiteout conditions, howling wind, dramatic and desolate',
        77: 'a frost and snow grains winter scene, delicate ice crystals on grass and leaves, sharp cold light',
        80: 'a rain shower breaking over a green landscape with a vivid rainbow arching across the sky, dramatic contrast',
        81: 'rain showers with dark dramatic clouds over an open landscape, shafts of light piercing through breaks',
        82: 'a violent heavy rain shower over a stormy landscape, near-black sky, intense rainfall, cinematic drama',
        85: 'a light snow shower over a winter landscape, soft flakes swirling in the air, cold and peaceful',
        86: 'a heavy snowfall and blizzard, dense snow filling the air, barely visible landscape through the storm',
        95: 'a dramatic thunderstorm over a vast open landscape, lightning splitting a dark purple sky, towering storm clouds, cinematic wide angle',
        96: 'a severe thunderstorm with large hail, lightning strikes illuminating dark storm clouds, violent and dramatic',
        99: 'an extreme thunderstorm with heavy hail and multiple lightning bolts, apocalyptic dark sky, raw elemental power',
    };

    function wmoPrompt(code) {
        var p = WMO_PROMPT[code];
        if (p) return p;
        var codes = Object.keys(WMO_PROMPT).map(Number).sort(function(a,b){return a-b;});
        for (var i = codes.length - 1; i >= 0; i--) {
            if (codes[i] <= code) return WMO_PROMPT[codes[i]];
        }
        return 'a beautiful natural landscape, wide angle, scenic';
    }

    // ── Generated image URL ──
    function buildGeneratedUrl(wmoCode, location, style) {
        // Deterministic seed: date + location → same image for same day/place
        var today = new Date();
        var dateStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');
        var seedStr = dateStr + ':' + location.toLowerCase();
        var seed = 5381;
        for (var i = 0; i < seedStr.length; i++) {
            seed = ((seed << 5) + seed) ^ seedStr.charCodeAt(i);
        }
        seed = Math.abs(seed);

        var styleSuffix = (style === 'illustrated')
            ? ', digital painting, illustration style, painterly, vibrant colors'
            : ', photorealistic, ultra detailed, professional photography, 8k';

        var prompt = wmoPrompt(wmoCode) + styleSuffix;
        return 'https://image.pollinations.ai/prompt/' +
            encodeURIComponent(prompt) +
            '?width=1920&height=1080&nologo=true&seed=' + seed;
    }

    function wmoQuery(code) {
        // Find nearest matching code
        var q = WMO_QUERY[code];
        if (q) return q;
        // Fallback: find closest code
        var codes = Object.keys(WMO_QUERY).map(Number).sort(function(a,b){return a-b;});
        for (var i = codes.length - 1; i >= 0; i--) {
            if (codes[i] <= code) return WMO_QUERY[codes[i]];
        }
        return 'mountains';
    }

    function wmoDesc(code) {
        return WMO_DESC[code] || 'Unknown';
    }

    // ── Prefs ──
    function getPrefs() {
        var p = new URLSearchParams(window.location.search);
        return {
            location:    p.get('location') || '',
            units:       p.get('units') || 'c',
            overlay:     p.get('overlay') !== 'off',
            unsplashKey: p.get('key') || '',
            source:      p.get('source') || 'unsplash',
            style:       p.get('style') || 'photo',
        };
    }

    function setParam(key, val) {
        var p = new URLSearchParams(window.location.search);
        p.set(key, val);
        history.replaceState(null, '', '?' + p.toString());
    }

    function fmtTemp(t, units) {
        return Math.round(t) + '\u00b0' + (units === 'f' ? 'F' : 'C');
    }

    // ── Cache ──
    var CACHE_KEY = 'weather-art-v1';
    var CACHE_TTL = 60 * 60 * 1000; // 1 hour

    function readCache() {
        try {
            var c = JSON.parse(sessionStorage.getItem(CACHE_KEY));
            if (c && Date.now() - c.ts < CACHE_TTL) return c;
        } catch (e) {}
        return null;
    }

    function writeCache(data) {
        try {
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(Object.assign({}, data, { ts: Date.now() })));
        } catch (e) {}
    }

    function clearCache() {
        try { sessionStorage.removeItem(CACHE_KEY); } catch (e) {}
    }

    // ── API: geocode ──
    function geocode(name) {
        var url = 'https://geocoding-api.open-meteo.com/v1/search?name=' +
            encodeURIComponent(name) + '&count=1&language=en&format=json';
        return fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.results || !data.results.length) {
                    throw new Error('Location not found');
                }
                var r = data.results[0];
                return {
                    lat:  r.latitude,
                    lon:  r.longitude,
                    name: r.name + (r.country ? ', ' + r.country : ''),
                };
            });
    }

    // ── API: weather ──
    function fetchWeather(lat, lon, units) {
        var url = 'https://api.open-meteo.com/v1/forecast' +
            '?latitude=' + lat +
            '&longitude=' + lon +
            '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
            '&temperature_unit=' + (units === 'f' ? 'fahrenheit' : 'celsius') +
            '&forecast_days=1' +
            '&timezone=auto';
        return fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var d = data.daily;
                return {
                    code: d.weather_code[0],
                    max:  d.temperature_2m_max[0],
                    min:  d.temperature_2m_min[0],
                };
            });
    }

    // ── API: Unsplash ──
    function fetchPhoto(query, key) {
        var url = 'https://api.unsplash.com/photos/random' +
            '?query=' + encodeURIComponent(query) +
            '&orientation=landscape' +
            '&count=10' +
            '&client_id=' + encodeURIComponent(key);
        return fetch(url)
            .then(function (r) {
                if (!r.ok) throw new Error('Unsplash error ' + r.status);
                return r.json();
            })
            .then(function (photos) {
                var best = photos.reduce(function (a, b) {
                    return (b.downloads > a.downloads) ? b : a;
                });
                return {
                    url:              best.urls.regular,
                    photoPage:        best.links.html + '?utm_source=weather_art&utm_medium=referral',
                    photographerName: best.user.name,
                    photographerUrl:  best.user.links.html + '?utm_source=weather_art&utm_medium=referral',
                };
            });
    }

    // ── DOM ──
    var img          = document.getElementById('art-img');
    var overlay      = document.getElementById('art-overlay');
    var overlayWx    = document.getElementById('overlay-weather');
    var overlayLoc   = document.getElementById('overlay-location');
    var placeholder  = document.getElementById('art-placeholder');
    var placeholderMsg = document.getElementById('placeholder-msg');

    var btnUnits         = document.getElementById('btn-units');
    var btnOverlay       = document.getElementById('btn-overlay');
    var btnSource        = document.getElementById('btn-source');
    var btnStyle         = document.getElementById('btn-style');
    var locationInput    = document.getElementById('location-input');
    var keyInput         = document.getElementById('unsplash-key-input');
    var rowStyle         = document.getElementById('row-style');
    var rowUnsplashLabel = document.getElementById('row-unsplash-label');
    var rowUnsplashKey   = document.getElementById('row-unsplash-key');

    function showPlaceholder(msg) {
        placeholderMsg.textContent = msg;
        placeholder.classList.remove('hidden');
        img.classList.remove('loaded');
        overlay.classList.add('hidden');
    }

    function renderImage(photo, weather, geoName, units) {
        overlayWx.textContent = wmoDesc(weather.code) +
            ' \u2014 ' + fmtTemp(weather.min, units) + ' / ' + fmtTemp(weather.max, units);
        overlayLoc.textContent = geoName;

        img.onerror = function () {
            showPlaceholder('Image failed to load');
        };
        img.onload = function () {
            placeholder.classList.add('hidden');
            img.classList.add('loaded');

            var prefs = getPrefs();
            if (prefs.overlay) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        };
        img.src = photo.url;
    }

    // ── Load ──
    var cachedGeo = null;

    function load(forceGeocode) {
        var prefs = getPrefs();

        if (!prefs.location) {
            showPlaceholder('Set a location in preferences');
            return;
        }
        if (prefs.source === 'unsplash' && !prefs.unsplashKey) {
            showPlaceholder('Set an Unsplash API key in preferences');
            return;
        }

        showPlaceholder('Loading\u2026');

        var geoPromise = (cachedGeo && !forceGeocode)
            ? Promise.resolve(cachedGeo)
            : geocode(prefs.location).then(function (g) { cachedGeo = g; return g; });

        geoPromise
            .then(function (geo) {
                return fetchWeather(geo.lat, geo.lon, prefs.units)
                    .then(function (weather) {
                        if (prefs.source === 'generated') {
                            // URL is deterministic — no fetch or cache needed
                            var url = buildGeneratedUrl(weather.code, prefs.location, prefs.style);
                            renderImage({ url: url }, weather, geo.name, prefs.units);
                            return;
                        }

                        // Unsplash path
                        var cached = readCache();
                        if (cached && cached.code === weather.code && cached.location === prefs.location) {
                            renderImage(cached.photo, weather, geo.name, prefs.units);
                            return;
                        }

                        var query = wmoQuery(weather.code);
                        return fetchPhoto(query, prefs.unsplashKey)
                            .then(function (photo) {
                                writeCache({ code: weather.code, location: prefs.location, photo: photo });
                                renderImage(photo, weather, geo.name, prefs.units);
                            });
                    });
            })
            .catch(function (err) {
                showPlaceholder(err.message || 'Failed to load');
            });
    }

    // ── Controls ──
    function updateControls() {
        var prefs = getPrefs();
        btnUnits.textContent  = prefs.units === 'f' ? '\u00b0F' : '\u00b0C';
        btnUnits.classList.toggle('active', prefs.units === 'f');
        btnOverlay.textContent = prefs.overlay ? 'On' : 'Off';
        btnOverlay.classList.toggle('active', prefs.overlay);
        locationInput.value = prefs.location;
        keyInput.value = prefs.unsplashKey;

        var isGenerated = prefs.source === 'generated';
        btnSource.textContent = isGenerated ? 'Generated' : 'Unsplash';
        btnSource.classList.toggle('active', isGenerated);

        var isIllustrated = prefs.style === 'illustrated';
        btnStyle.textContent = isIllustrated ? 'Illustrated' : 'Photo';
        btnStyle.classList.toggle('active', isIllustrated);

        rowStyle.style.display         = isGenerated ? '' : 'none';
        rowUnsplashLabel.style.display = isGenerated ? 'none' : '';
        rowUnsplashKey.style.display   = isGenerated ? 'none' : '';
    }

    btnUnits.addEventListener('click', function () {
        var prefs = getPrefs();
        setParam('units', prefs.units === 'f' ? 'c' : 'f');
        updateControls();
        load(false);
    });

    btnOverlay.addEventListener('click', function () {
        var prefs = getPrefs();
        setParam('overlay', prefs.overlay ? 'off' : 'on');
        updateControls();
        // Just toggle visibility without reloading
        var newPrefs = getPrefs();
        if (img.classList.contains('loaded')) {
            overlay.classList.toggle('hidden', !newPrefs.overlay);
        }
    });

    locationInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') locationInput.blur();
    });

    locationInput.addEventListener('blur', function () {
        var val = locationInput.value.trim();
        if (val !== getPrefs().location) {
            setParam('location', val);
            cachedGeo = null;
            clearCache();
            load(true);
        }
    });

    keyInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') keyInput.blur();
    });

    keyInput.addEventListener('blur', function () {
        var val = keyInput.value.trim();
        if (val !== getPrefs().unsplashKey) {
            setParam('key', val);
            clearCache();
            load(false);
        }
    });

    btnSource.addEventListener('click', function () {
        var prefs = getPrefs();
        setParam('source', prefs.source === 'generated' ? 'unsplash' : 'generated');
        clearCache();
        updateControls();
        load(false);
    });

    btnStyle.addEventListener('click', function () {
        var prefs = getPrefs();
        setParam('style', prefs.style === 'illustrated' ? 'photo' : 'illustrated');
        updateControls();
        load(false);
    });

    // ── Init ──
    updateControls();
    load(true);

    // Refresh photo every hour
    setInterval(function () {
        clearCache();
        load(false);
    }, 60 * 60 * 1000);

})();
</script>
{% endblock %}
